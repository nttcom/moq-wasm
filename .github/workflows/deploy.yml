name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        # actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 = v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install Rust
        # dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 = v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: ./.github/actions/setup-wasm-pack

      - name: Configure GitHub Pages
        # actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d = v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Setup Node.js
        # actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 = v7.0.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          # no lockfile at repo root; opt out of the v5+ default auto-caching
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci
        working-directory: examples/browser

      - name: Build with Vite
        run: npm run build
        working-directory: examples/browser

      - name: Archive GitHub Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory examples/browser/dist \
            -cvf "${RUNNER_TEMP}/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .

      - name: Upload GitHub Pages artifact
        # actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a = v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 = v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
