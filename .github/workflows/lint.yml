name: Lint

on:
  pull_request:
  push:
    branches:
      - master
      - draft-*

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: rust:1.96.0@sha256:4fd8406017c992f7b8ab55a2f99a1d56aeb1d7ecd255850dfa04239a88601f73
    env:
      RUSTFLAGS: "--cfg=tokio_unstable --cfg=web_sys_unstable_apis"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 = v2.9.1
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install Clippy and Rustfmt
        run: |
          rustup component add clippy
          rustup component add rustfmt
      - name: Install FFmpeg build dependencies
        uses: ./.github/actions/install-ffmpeg-deps
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check code formatting
        run: cargo fmt --all -- --check
      - name: Run Unit Tests
        run: cargo test
  cargo-audit:
    runs-on: ubuntu-latest
    container:
      image: rust:1.96.0@sha256:4fd8406017c992f7b8ab55a2f99a1d56aeb1d7ecd255850dfa04239a88601f73
    env:
      CARGO_AUDIT_VERSION: 0.22.2
      CARGO_HOME: /usr/local/cargo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        # actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 = v6.1.0
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: /usr/local/cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-rust-1.96.0-${{ env.CARGO_AUDIT_VERSION }}
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install --locked cargo-audit --version "$CARGO_AUDIT_VERSION"
      - name: Verify cargo-audit version
        run: |
          actual="$(cargo-audit --version)"
          expected="cargo-audit ${CARGO_AUDIT_VERSION}"
          case "$actual" in
            "$expected"*) ;;
            *)
              echo "Unexpected cargo-audit version: $actual" >&2
              exit 1
              ;;
          esac
      - name: Run cargo audit
        run: cargo audit
  test-coverage-report:
    name: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin@sha256:71d8b18946f16ad3f8dc2d8e5055094b750e996c9e880573b03374dd78806228
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 = v2.9.1
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install FFmpeg build dependencies
        uses: ./.github/actions/install-ffmpeg-deps
      - name: Generate code coverage
        run: |
          RUSTFLAGS="--cfg=web_sys_unstable_apis --cfg=tokio_unstable" cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml
      - name: Upload to codecov.io
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          fail_ci_if_error: true
  prettier:
    runs-on: ubuntu-latest
    container:
      image: cimg/node:21.6.2@sha256:c95ae0b7d9bc23abf5dd8a7794c79ba480660f71f07ba9d5a95309d18644ac5d
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install dependencies
        run: npm ci
        working-directory: examples/browser
      - name: Check code formatting
        run: npx --prefix examples/browser prettier --check "examples/browser/**/*.{js,jsx,ts,tsx,json,css,md}" --ignore-path examples/browser/.prettierignore
