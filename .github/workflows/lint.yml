name: Lint

on:
  pull_request:
  push:
    branches:
      - master
      - draft-*

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install Clippy and Rustfmt
        run: |
          rustup component add clippy
          rustup component add rustfmt
      - name: Install FFmpeg build dependencies
        uses: ./.github/actions/install-ffmpeg-deps
      - name: Run Clippy
        run: cargo clippy -- -D warnings
      - name: Check code formatting
        run: cargo fmt -- --check
      - name: Run Unit Tests
        run: cargo test
  cargo-audit:
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        run: cargo audit
  test-coverage-report:
    name: coverage
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install FFmpeg build dependencies
        uses: ./.github/actions/install-ffmpeg-deps
      - name: Generate code coverage
        run: |
          RUSTFLAGS="--cfg=web_sys_unstable_apis --cfg=tokio_unstable" cargo tarpaulin --verbose --all-features --workspace --timeout 120 --out xml
      - name: Upload to codecov.io
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          fail_ci_if_error: true
  prettier:
    runs-on: ubuntu-latest
    container:
      image: cimg/node:21.6.2
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: npm ci
        working-directory: examples/browser
      - name: Check code formatting
        run: npx --prefix examples/browser prettier --check "examples/browser/**/*.{js,jsx,ts,tsx,json,css,md}" --ignore-path examples/browser/.prettierignore
