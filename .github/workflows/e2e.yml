name: E2E

on:
  pull_request:
    paths:
      - ".github/workflows/e2e.yml"
      - ".github/workflows/relay-image.yml"
      - ".github/actions/setup-wasm-pack/**"
      - "README.md"
      - "scripts/setup-media-e2e.mjs"
      - "scripts/run-media-e2e.mjs"
      - "scripts/run-call-e2e.mjs"
      - "scripts/media-e2e-helpers.mjs"
      - "scripts/ensure-relay-certs.mjs"
      - "scripts/resolve-local-relay-url.mjs"
      - "scripts/chrome_linux.sh"
      - "scripts/cache-eviction-e2e.sh"
      - "scripts/cascading-relay-e2e.sh"
      - "scripts/fetch-e2e.sh"
      - "scripts/multiple-publishers-e2e.sh"
      - "scripts/object-dedup-e2e.sh"
      - "scripts/priority-e2e.sh"
      - "docker-compose.yml"
      - "examples/browser/**"
      - "bindings/wasm/**"
      - "relay/**"
      - "moqt/**"
      - "shared/**"
      - "tests/cache-eviction-e2e/**"
      - "tests/cascading-relay-e2e/**"
      - "tests/fetch-e2e/**"
      - "tests/multiple-publishers-e2e/**"
      - "tests/object-dedup-e2e/**"
      - "tests/priority-e2e/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain"
  push:
    branches:
      - master
      - draft-*
      - example-e2e-ci
    paths:
      - ".github/workflows/e2e.yml"
      - ".github/workflows/relay-image.yml"
      - ".github/actions/setup-wasm-pack/**"
      - "README.md"
      - "scripts/setup-media-e2e.mjs"
      - "scripts/run-media-e2e.mjs"
      - "scripts/run-call-e2e.mjs"
      - "scripts/media-e2e-helpers.mjs"
      - "scripts/ensure-relay-certs.mjs"
      - "scripts/resolve-local-relay-url.mjs"
      - "scripts/chrome_linux.sh"
      - "scripts/cache-eviction-e2e.sh"
      - "scripts/cascading-relay-e2e.sh"
      - "scripts/fetch-e2e.sh"
      - "scripts/multiple-publishers-e2e.sh"
      - "scripts/object-dedup-e2e.sh"
      - "scripts/priority-e2e.sh"
      - "docker-compose.yml"
      - "examples/browser/**"
      - "bindings/wasm/**"
      - "relay/**"
      - "moqt/**"
      - "shared/**"
      - "tests/cache-eviction-e2e/**"
      - "tests/cascading-relay-e2e/**"
      - "tests/fetch-e2e/**"
      - "tests/multiple-publishers-e2e/**"
      - "tests/object-dedup-e2e/**"
      - "tests/priority-e2e/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      media: ${{ steps.filter.outputs.media }}
      call: ${{ steps.filter.outputs.call }}
      cascading: ${{ steps.filter.outputs.cascading }}
      cache_eviction: ${{ steps.filter.outputs.cache_eviction }}
      fetch: ${{ steps.filter.outputs.fetch }}
      multipub: ${{ steps.filter.outputs.multipub }}
      dedup: ${{ steps.filter.outputs.dedup }}
      priority: ${{ steps.filter.outputs.priority }}
      relay: ${{ steps.filter.outputs.relay }}
      relay_image_source: ${{ steps.filter.outputs.relay_image_source }}
    steps:
      - name: Checkout repository
        # actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 = v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed E2E inputs
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            media=true
            call=true
            cascading=true
            cache_eviction=true
            fetch=true
            multipub=true
            dedup=true
            priority=true
          else
            base="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"

            if [[ -n "$base" && ! "$base" =~ ^0+$ ]] && git cat-file -e "$base^{commit}" 2>/dev/null; then
              git diff --name-only "$base" HEAD > changed-files.txt
            else
              git ls-tree -r --name-only HEAD > changed-files.txt
            fi

            media=false
            call=false
            cascading=false
            cache_eviction=false
            fetch=false
            multipub=false
            dedup=false
            priority=false

            while IFS= read -r path; do
              case "$path" in
                .github/workflows/e2e.yml|.github/actions/setup-wasm-pack/*|README.md|scripts/setup-media-e2e.mjs|scripts/run-media-e2e.mjs|scripts/media-e2e-helpers.mjs|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|scripts/chrome_linux.sh|examples/browser/*|bindings/wasm/*|relay/*|moqt/*|shared/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  media=true
                  ;;
              esac

              case "$path" in
                .github/workflows/e2e.yml|.github/workflows/relay-image.yml|.github/actions/setup-wasm-pack/*|scripts/setup-media-e2e.mjs|scripts/run-call-e2e.mjs|scripts/media-e2e-helpers.mjs|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|scripts/chrome_linux.sh|docker-compose.yml|examples/browser/*|bindings/wasm/*|relay/*|moqt/*|shared/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  call=true
                  ;;
              esac

              case "$path" in
                .github/workflows/e2e.yml|.github/workflows/relay-image.yml|scripts/cascading-relay-e2e.sh|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|docker-compose.yml|relay/*|moqt/*|shared/*|tests/cascading-relay-e2e/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  cascading=true
                  ;;
              esac

              case "$path" in
                .github/workflows/e2e.yml|.github/workflows/relay-image.yml|scripts/cache-eviction-e2e.sh|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|docker-compose.yml|relay/*|moqt/*|shared/*|tests/cache-eviction-e2e/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  cache_eviction=true
                  ;;
              esac

              case "$path" in
                .github/workflows/e2e.yml|.github/workflows/relay-image.yml|scripts/fetch-e2e.sh|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|docker-compose.yml|relay/*|moqt/*|shared/*|tests/fetch-e2e/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  fetch=true
                  ;;
              esac

              case "$path" in
                .github/workflows/e2e.yml|.github/workflows/relay-image.yml|scripts/multiple-publishers-e2e.sh|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|docker-compose.yml|relay/*|moqt/*|shared/*|tests/multiple-publishers-e2e/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  multipub=true
                  ;;
              esac

              case "$path" in
                .github/workflows/e2e.yml|.github/workflows/relay-image.yml|scripts/object-dedup-e2e.sh|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|docker-compose.yml|relay/*|moqt/*|shared/*|tests/object-dedup-e2e/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  dedup=true
                  ;;
              esac

              case "$path" in
                .github/workflows/e2e.yml|.github/workflows/relay-image.yml|scripts/priority-e2e.sh|scripts/ensure-relay-certs.mjs|scripts/resolve-local-relay-url.mjs|docker-compose.yml|relay/*|moqt/*|shared/*|tests/priority-e2e/*|Cargo.toml|Cargo.lock|rust-toolchain)
                  priority=true
                  ;;
              esac
            done < changed-files.txt
          fi

          if [[ "$call" == "true" || "$cascading" == "true" || "$cache_eviction" == "true" || "$fetch" == "true" || "$multipub" == "true" || "$dedup" == "true" || "$priority" == "true" ]]; then
            relay=true
          else
            relay=false
          fi

          if [[ "$relay" == "true" ]]; then
            if [[ "${{ github.event_name }}" == "pull_request" || ( "${{ github.event_name }}" == "push" && "${{ github.ref }}" != "refs/heads/master" ) ]]; then
              relay_image_source=local
            else
              relay_image_source=prebuilt
            fi
          else
            relay_image_source=none
          fi

          {
            echo "media=$media"
            echo "call=$call"
            echo "cascading=$cascading"
            echo "cache_eviction=$cache_eviction"
            echo "fetch=$fetch"
            echo "multipub=$multipub"
            echo "dedup=$dedup"
            echo "priority=$priority"
            echo "relay=$relay"
            echo "relay_image_source=$relay_image_source"
          } >> "$GITHUB_OUTPUT"

  relay_image_local:
    needs: changes
    if: ${{ needs.changes.outputs.relay == 'true' && needs.changes.outputs.relay_image_source == 'local' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 = v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Build local relay image for E2E
        run: docker build -t moqt-relay:local-source -f relay/Dockerfile .

      - name: Save relay image
        run: docker save moqt-relay:local-source | gzip > "${RUNNER_TEMP}/relay-image.tar.gz"

      - name: Upload relay image artifact
        # actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 = v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: relay-image-local
          path: ${{ runner.temp }}/relay-image.tar.gz
          retention-days: 1

  relay_image:
    needs: changes
    if: ${{ needs.changes.outputs.relay == 'true' && needs.changes.outputs.relay_image_source == 'prebuilt' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/relay-image.yml

  media_e2e:
    needs: changes
    if: ${{ needs.changes.outputs.media == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        # actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 = v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        # actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 = v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/browser/package-lock.json

      - name: Setup Rust toolchain
        # dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 = v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 = v2.9.1
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Install wasm-pack
        uses: ./.github/actions/setup-wasm-pack

      - name: Prepare media E2E environment
        run: node scripts/setup-media-e2e.mjs

      - name: Install Playwright Linux dependencies
        working-directory: examples/browser
        run: npx playwright install --with-deps chromium

      - name: Run media E2E
        env:
          CI: "true"
        run: node scripts/run-media-e2e.mjs

      - name: Upload Playwright artifacts
        if: failure()
        # actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 = v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: media-e2e-artifacts
          path: |
            examples/browser/test-results
            examples/browser/playwright-report
          if-no-files-found: ignore

  call_e2e:
    needs: [changes, relay_image_local, relay_image]
    if: ${{ always() && needs.changes.outputs.call == 'true' && ((needs.changes.outputs.relay_image_source == 'local' && needs.relay_image_local.result == 'success') || (needs.changes.outputs.relay_image_source == 'prebuilt' && needs.relay_image.result == 'success')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        # actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 = v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        # actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 = v4.4.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/browser/package-lock.json

      - name: Setup Rust toolchain
        # dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 = v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.96.0
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 = v2.9.1
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Install wasm-pack
        uses: ./.github/actions/setup-wasm-pack

      - name: Prepare browser E2E environment
        run: node scripts/setup-media-e2e.mjs

      - name: Install Playwright Linux dependencies
        working-directory: examples/browser
        run: npx playwright install --with-deps chromium

      - name: Download local relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'local' }}
        # actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 = v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: relay-image-local
          path: ${{ runner.temp }}/relay-image

      - name: Load local relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'local' }}
        run: |
          gunzip -c "${RUNNER_TEMP}/relay-image/relay-image.tar.gz" | docker load
          docker tag moqt-relay:local-source moqt-relay:local

      - name: Log in to GHCR
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        # docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 = v3.7.0
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        run: |
          docker pull "${{ needs.relay_image.outputs.image }}"
          docker tag "${{ needs.relay_image.outputs.image }}" moqt-relay:local

      - name: Log out from GHCR
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        run: docker logout ghcr.io

      - name: Run call E2E
        env:
          CI: "true"
        run: node scripts/run-call-e2e.mjs

      - name: Upload Playwright artifacts
        if: failure()
        # actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 = v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: call-e2e-artifacts
          path: |
            examples/browser/test-results
            examples/browser/playwright-report
          if-no-files-found: ignore

  cascading_relay_e2e:
    needs: [changes, relay_image_local, relay_image]
    if: ${{ always() && needs.changes.outputs.cascading == 'true' && ((needs.changes.outputs.relay_image_source == 'local' && needs.relay_image_local.result == 'success') || (needs.changes.outputs.relay_image_source == 'prebuilt' && needs.relay_image.result == 'success')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        # actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 = v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        # dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 = v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.96.0

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 = v2.9.1
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Download local relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'local' }}
        # actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 = v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: relay-image-local
          path: ${{ runner.temp }}/relay-image

      - name: Load local relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'local' }}
        run: |
          gunzip -c "${RUNNER_TEMP}/relay-image/relay-image.tar.gz" | docker load
          docker tag moqt-relay:local-source moqt-relay:local

      - name: Log in to GHCR
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        # docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 = v3.7.0
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        run: |
          docker pull "${{ needs.relay_image.outputs.image }}"
          docker tag "${{ needs.relay_image.outputs.image }}" moqt-relay:local

      - name: Log out from GHCR
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        run: docker logout ghcr.io

      - name: Run cascading relay E2E
        env:
          CI: "true"
        run: ./scripts/cascading-relay-e2e.sh

  cache_eviction_e2e:
    needs: [changes, relay_image_local, relay_image]
    if: ${{ always() && needs.changes.outputs.cache_eviction == 'true' && ((needs.changes.outputs.relay_image_source == 'local' && needs.relay_image_local.result == 'success') || (needs.changes.outputs.relay_image_source == 'prebuilt' && needs.relay_image.result == 'success')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        # actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 = v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        # dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 = v1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.96.0

      - name: Cache Rust build artifacts
        # Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 = v2.9.1
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Download local relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'local' }}
        # actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 = v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: relay-image-local
          path: ${{ runner.temp }}/relay-image

      - name: Load local relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'local' }}
        run: |
          gunzip -c "${RUNNER_TEMP}/relay-image/relay-image.tar.gz" | docker load
          docker tag moqt-relay:local-source moqt-relay:local

      - name: Log in to GHCR
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        # docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 = v3.7.0
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull prebuilt relay image
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        run: |
          docker pull "${{ needs.relay_image.outputs.image }}"
          docker tag "${{ needs.relay_image.outputs.image }}" moqt-relay:local

      - name: Log out from GHCR
        if: ${{ needs.changes.outputs.relay_image_source == 'prebuilt' }}
        run: docker logout ghcr.io

      - name: Run cache-eviction E2E
        env:
          CI: "true"
        run: ./scripts/cache-eviction-e2e.sh

  fetch_e2e:
    needs: [changes, relay_image_local, relay_image]
    if: ${{ always() && needs.changes.outputs.fetch == 'true' && ((needs.changes.outputs.relay_image_source == 'local' && needs.relay_image_local.result == 'success') || (needs.changes.outputs.relay_image_source == 'prebuilt' && needs.relay_image.result == 'success')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        # actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 = v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
