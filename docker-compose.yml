services:
  redis:
    image: redis:7@sha256:33d7c9a245edd95e6703a0addbeaa48fe40c3b3b4783627a72085155462ebfdb
    ports:
      - "6379:6379"
    # Relays connect to redis once at startup with no retry, so gate them on health.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  redisinsight:
    image: redis/redisinsight:3.6.0@sha256:aa21bbd198455b4ad964f76782db951155aa0d712321f599972d1525f031f0e6
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

  relay-common:
    image: moqt-relay:local
    build:
      context: .
      dockerfile: relay/Dockerfile
    profiles:
      - build
    command: ["true"]

  relay-a:
    image: moqt-relay:local
    env_file:
      - path: .env
        required: false
    environment:
      RELAY_ID: relay-a
      RELAY_ADVERTISE_HOST: relay-a
      RELAY_PORT: "443"
      RELAY_INNER_PORT: "444"
      REDIS_URL: redis://redis:6379
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      RELAY_STDOUT_FILTER: ${RELAY_STDOUT_FILTER:-relay=info,moqt=info}
      RELAY_OTEL_FILTER: ${RELAY_OTEL_FILTER:-relay=info,moqt=info}
      RELAY_LOG_FILTER: ${RELAY_LOG_FILTER:-relay=info,moqt=info}
    ports:
      - "4433:443/udp"
    # Playwright pins the host certificate SPKI; relay must serve the same keypair.
    volumes:
      - ./relay/keys:/workspace/relay/keys:ro
    depends_on:
      redis:
        condition: service_healthy

  relay-b:
    image: moqt-relay:local
    env_file:
      - path: .env
        required: false
    environment:
      RELAY_ID: relay-b
      RELAY_ADVERTISE_HOST: relay-b
      RELAY_PORT: "443"
      RELAY_INNER_PORT: "444"
      REDIS_URL: redis://redis:6379
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      RELAY_STDOUT_FILTER: ${RELAY_STDOUT_FILTER:-relay=info,moqt=info}
      RELAY_OTEL_FILTER: ${RELAY_OTEL_FILTER:-relay=info,moqt=info}
      RELAY_LOG_FILTER: ${RELAY_LOG_FILTER:-relay=info,moqt=info}
    ports:
      - "4434:443/udp"
    # Playwright pins the host certificate SPKI; relay must serve the same keypair.
    volumes:
      - ./relay/keys:/workspace/relay/keys:ro
    depends_on:
      redis:
        condition: service_healthy
