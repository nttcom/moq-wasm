[package]
name = "packages"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = []
wasm = ["wasm-bindgen", "serde-wasm-bindgen"]

[dependencies]
moqt = { path = "../../moqt" }
bytes = "1"
serde = { version = "1.0.228", features = ["derive"] }
wasm-bindgen = { version = "0.2.123", optional = true }
serde-wasm-bindgen = { version = "0.6.5", optional = true }
